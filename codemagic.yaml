workflows:
  ios-build:
    name: Build iOS IPA for Device
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: Build IPA for device
        script: flutter build ipa --release --export-options-plist=ios/exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - hassangroupcom@hotmail.com
        notify:
          success: true
          failure: true