workflows:
  ios-build:
    name: Build iOS App
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean
        script: flutter clean
      - name: Install dependencies
        script: flutter pub get
      - name: Build for device (unsigned)
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app